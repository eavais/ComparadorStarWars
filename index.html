<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Wars Comparator</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="min-h-screen bg-slate-950 text-yellow-300">

    <div class="container mx-auto p-6">

        <header class="text-center mb-8">
            <h1 class="text-4xl md:text-5xl font-bold tracking-widest text-yellow-400">
                Star Wars Comparator
            </h1>

            <p class="text-slate-300 mt-3">
                Selecciona dos personajes y compara sus características
            </p>
        </header>

        <main>

            <section class="bg-black border border-yellow-400 rounded-3xl p-6 shadow-2xl mb-8">

                <h2 class="text-2xl font-bold text-center text-yellow-400 mb-6">
                    Personajes seleccionados
                </h2>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 items-center">

                    <div id="selected-character-1" class="bg-slate-900 border border-slate-700 rounded-2xl p-6 text-center min-h-64 flex flex-col justify-center">
                        <p class="text-slate-400">
                            Selecciona el primer personaje
                        </p>
                    </div>

                    <div class="flex flex-col items-center gap-4">

                        <button id="compare-btn" class="bg-yellow-400 text-black font-bold px-6 py-3 rounded-xl shadow hover:bg-yellow-300 disabled:bg-gray-600 disabled:text-gray-300 disabled:cursor-not-allowed" disabled>
                            Comparar
                        </button>

                        <button id="clear-btn" class="bg-red-700 text-white font-bold px-6 py-3 rounded-xl shadow hover:bg-red-600">
                            Limpiar comparación
                        </button>

                    </div>

                    <div id="selected-character-2" class="bg-slate-900 border border-slate-700 rounded-2xl p-6 text-center min-h-64 flex flex-col justify-center">
                        <p class="text-slate-400">
                            Selecciona el segundo personaje
                        </p>
                    </div>

                </div>

            </section>

            <section id="comparison-section" class="hidden bg-black border border-yellow-400 rounded-3xl p-6 shadow-2xl mb-8">

                <h2 class="text-2xl font-bold text-center text-yellow-400 mb-6">
                    Resultado de comparación
                </h2>

                <div id="comparison-result" class="overflow-x-auto">
                </div>

            </section>

            <section class="bg-black border border-yellow-400 rounded-3xl p-6 shadow-2xl">

                <h2 class="text-2xl font-bold text-center text-yellow-400 mb-6">
                    Personajes disponibles
                </h2>

                <div id="character-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                </div>

            </section>

        </main>

    </div>

    <script src="index.js"></script>
</body>

</html>
